services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: english-agent-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_agent_hub
    ports:
      - "5436:5432"
    volumes:
      - english_agent_hub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  english_agent_hub_postgres_data:
    driver: local
